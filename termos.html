### 1. Aceitação dos Termos

Bem-vindo(a) ao **PsiquèIA** ("Plataforma", "Serviço"). Estes Termos e Condições de Uso ("Termos") regem o seu acesso e uso do nosso aplicativo móvel e serviços relacionados. 

Ao criar uma conta, acessar ou utilizar a Plataforma, você celebra um contrato vinculativo com a **Psiqueia Inteligência Emocional e Digital Ltda.**, pessoa jurídica de direito privado, inscrita no CNPJ sob o nº **61.704.634/0001-10**, com sede na Rua Antonio Serafin Gonçalves, 38, Bairro Km 60, Tubarão/SC, CEP 88702-890 ("Empresa", "nós") e concorda em cumprir integralmente com estes Termos e com nossa **Política de Privacidade**.

> **Se você não concorda com qualquer parte destes Termos, você não deve criar uma conta ou utilizar nossos serviços.**

### 2. Descrição dos Serviços

O PsiquèIA é uma plataforma de tecnologia que visa facilitar a conexão entre pacientes que buscam serviços de saúde mental e psicólogos devidamente licenciados. Nossos serviços incluem:

-   **Intermediação:** Conexão entre pacientes e psicólogos.
-   **Agendamento:** Ferramentas para marcar, gerenciar e realizar sessões de telessaúde.
-   **Pagamento:** Processamento de pagamentos para as sessões através de um provedor de serviços terceirizado (Stripe).
-   **Ferramentas de Apoio:** Funcionalidades como diário emocional e insights gerados por inteligência artificial para apoiar o processo terapêutico.

**Importante:** O PsiquèIA **não é um provedor de serviços de saúde, não oferece serviços médicos ou psicológicos e não se responsabiliza pela prática profissional dos psicólogos.** Nossa função é estritamente de intermediação tecnológica. A relação terapêutica ocorre exclusivamente entre o paciente e o psicólogo.

### 3. Cadastro e Elegibilidade

-   **Idade Mínima:** Para criar uma conta, você deve ter no mínimo **18 anos de idade** e possuir plena capacidade legal.
-   **Veracidade das Informações:** Você se compromete a fornecer informações verdadeiras, precisas e atualizadas durante o cadastro e a mantê-las assim.
-   **Segurança da Conta:** Você é o único responsável por manter a confidencialidade de sua senha e por todas as atividades que ocorrerem em sua conta. Notifique-nos imediatamente sobre qualquer uso não autorizado.

### 4. Responsabilidades dos Usuários

#### 4.1. Responsabilidades dos Pacientes

Ao utilizar a Plataforma como Paciente, você concorda em:

-   Utilizar os serviços apenas para fins lícitos e pessoais.
-   Respeitar os horários agendados e a política de cancelamento.
-   Realizar os pagamentos das sessões conforme os valores estipulados pelo psicólogo.
-   Não gravar, transmitir ou compartilhar o conteúdo das sessões de terapia sem o consentimento explícito do psicólogo.
-   Entender que o PsiquèIA não é um serviço de emergência. **Em caso de crise ou emergência de saúde mental, ligue para 188 (CVV) ou procure o serviço de emergência mais próximo.**

#### 4.2. Responsabilidades dos Psicólogos

Ao utilizar a Plataforma como Psicólogo, você declara e concorda que:

-   Possui licença ativa e regular junto ao Conselho Regional de Psicologia (CRP) para exercer a profissão.
-   Cumprirá rigorosamente o **Código de Ética Profissional do Psicólogo** e todas as regulamentações do Conselho Federal de Psicologia (CFP) sobre atendimento online.
-   É o único responsável pela qualidade, ética e técnica dos serviços prestados, incluindo diagnósticos, aconselhamentos e planos de tratamento.
-   Manterá a confidencialidade e o sigilo das informações de seus pacientes, conforme a legislação aplicável.
-   Configurará e manterá sua conta de recebimento (Stripe Connect) de forma precisa para garantir o repasse dos valores das sessões.

### 5. Pagamentos, Taxas e Reembolsos

-   **Preços:** Os preços das sessões são definidos exclusivamente pelos psicólogos e exibidos em seus perfis.
-   **Taxa da Plataforma:** O PsiquèIA retém uma taxa de serviço de **10%** sobre o valor de cada sessão paga através da plataforma. Este valor é deduzido automaticamente antes do repasse ao psicólogo e serve para cobrir os custos de operação, manutenção e melhoria dos nossos serviços.
-   **Processamento de Pagamentos:** Todos os pagamentos são processados pela **Stripe**, uma plataforma de pagamentos globalmente reconhecida e segura. O PsiquèIA não armazena os dados do seu cartão de crédito.
-   **Repasses:** Os valores devidos aos psicólogos (preço da sessão menos a taxa da plataforma) são repassados automaticamente pela Stripe para a conta bancária cadastrada, conforme os prazos e condições da Stripe.
-   **Reembolsos:** Reembolsos são regidos pela política de cancelamento (Seção 6). Para solicitar um reembolso elegível, entre em contato com nosso suporte em **billing@psiqueia.com**.

### 6. Agendamento e Cancelamento de Sessões

-   **Agendamento:** As sessões devem ser agendadas e pagas através da plataforma para garantir a segurança e o registro da transação.
-   **Política de Cancelamento (Padrão):**
    -   **Cancelamento com mais de 24 horas de antecedência:** O paciente tem direito ao reembolso integral do valor pago.
    -   **Cancelamento com menos de 24 horas de antecedência ou não comparecimento:** Não haverá reembolso. O valor será repassado ao psicólogo para compensar o horário reservado.
-   **Cancelamento pelo Psicólogo:** Se um psicólogo cancelar uma sessão, o paciente será reembolsado integralmente, independentemente da antecedência.

### 7. Uso da Inteligência Artificial

As ferramentas de IA (análise de diário, chatbot) são recursos de apoio e não substituem a terapia. 

-   **Não é um Diagnóstico:** Os insights gerados pela IA não constituem diagnóstico médico ou psicológico.
-   **Confidencialidade:** Suas interações com a IA são confidenciais e tratadas conforme nossa Política de Privacidade.
-   **Uso Consciente:** Utilize a IA como uma ferramenta de autoconhecimento, mas sempre discuta questões importantes com seu psicólogo.

### 8. Propriedade Intelectual

-   **Nossa Propriedade:** A marca PsiquèIA, o software, o design, os textos e os gráficos da plataforma são de propriedade exclusiva da Psiqueia Inteligência Emocional e Digital Ltda. (CNPJ 61.704.634/0001-10).
-   **Seu Conteúdo:** Você retém a propriedade sobre o conteúdo que você gera (entradas de diário, notas, etc.). No entanto, você nos concede uma licença limitada, não exclusiva e isenta de royalties para usar, armazenar e processar esse conteúdo com o único propósito de operar e melhorar a plataforma.

### 9. Isenção de Garantias e Limitação de Responsabilidade

-   **A Plataforma é fornecida "COMO ESTÁ"**, sem garantias de qualquer tipo. Não garantimos que o serviço será ininterrupto, livre de erros ou totalmente seguro.
-   **O PsiquèIA não se responsabiliza pela conduta, qualidade do serviço ou conselhos de qualquer psicólogo.** A responsabilidade pela prática profissional é exclusiva do psicólogo.
-   **Nossa responsabilidade total** por quaisquer danos decorrentes do uso da plataforma limita-se ao valor total pago por você nos últimos três (3) meses.

### 10. Privacidade e Confidencialidade

Nós nos comprometemos a proteger seus dados. Nossa **Política de Privacidade**, que é parte integrante destes Termos, detalha como coletamos, usamos e protegemos suas informações.

### 11. Suspensão e Rescisão de Conta

Reservamo-nos o direito de suspender ou encerrar sua conta, sem aviso prévio, caso você viole qualquer um destes Termos, incluindo, mas não se limitando a:

-   Fornecer informações falsas.
-   Realizar atividades fraudulentas ou ilegais.
-   Assediar ou desrespeitar outros usuários.

### 12. Legislação Aplicável e Foro

Estes Termos serão regidos e interpretados de acordo com as leis da República Federativa do Brasil. Fica eleito o foro da Comarca de Tubarão, Estado de Santa Catarina, para dirimir quaisquer controvérsias decorrentes deste documento, com renúncia a qualquer outro, por mais privilegiado que seja.

### 13. Disposições Gerais

-   **Atualizações dos Termos:** Podemos modificar estes Termos a qualquer momento. Notificaremos você sobre alterações significativas. O uso contínuo da plataforma após a notificação constituirá sua aceitação dos novos termos.
-   **Contato:** Para qualquer dúvida sobre estes Termos, entre em contato conosco pelo e-mail **contact@psiqueia.com**.
